<!DOCTYPE html>
<html lang="en">
<head>
<title>Register</title>
<meta charset="utf-8 ">
<link rel="stylesheet" href="css/register.css">
</head>

<body>
    <div class="page">

        <div class="progressline">
            <div class="progresslight"></div>
            <div class="step">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
        </div>

        <div class="Register">
            <form>
                <div class="slider">
                    <div class="inputName">
                        <h1>Start your musical journey with MAMAMIYA.</h1>
                        <p>Create an account to discover premium instruments, manage your orders,<br> and enjoy a seamless shopping experience.</p>
                        <h2 class="headername">Name</h2>

                        <div class="row">
                            <label>
                                <input
                                type="text"
                                placeholder="Fisrt name"
                                name="fisrtname"
                                class="fullname"
                                required
                                >
                            </label>

                            <label>
                                <input
                                type="text"
                                placeholder="Last name"
                                name="lastname"
                                class="fullname"
                                required
                                >
                            </label>
                        </div>

                        <br>

                        <label class="labelname">
                            <input
                            type="text" 
                            placeholder="Username"
                            name="username"
                            class="surname"
                            required>
                        </label>
                        
                    </div>

                    <div class="inputEmail">
                        <label>
                            <input
                            type="email"
                            placeholder="Email"
                            name="email"
                            class="email"
                            required>
                        </label>
                    </div>

                    <div class="inputPassword">
                        <label>
                            <input
                            type="password"
                            placeholder="password"
                            name="password"
                            class="password"
                            required>
                        </label>

                        <label>
                            <input
                            type="password"
                            placeholder="comfirm password"
                            name="comfirmpassword"
                            class="password"
                            required>
                        </label>
                    </div>
                </div>
                <div class="Continue">
                <button class="Continuebutton" type="button">Continue</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
