<!DOCTYPE html>
<html lang="en">
<head>
<title>Login Page & Register</title>
<meta charset="utf-8 ">
<link rel="stylesheet" href="css/login.css">
</head>

<body>
<div class="Page">
    <div class="LoginPage">
        <form class="Login">
            <p class="LoginTitle">Login to MAMAMIYA</p>
            <label>
                <input 
                type="text" 
                placeholder="Username or Email address"
                name="UserName"
                required
                class="input"
                >
            </label>
            
            <br>

            <label>
                <input 
                type="password" 
                placeholder="Password"
                name="password"
                id="LoginPwd"
                required
                class="input"
                >
            </label>

            <div class="showpassword">
                <input class="click" type="checkbox" id="show">

                <label for="show" class="click">Show Password</label>
            </div>

            <button class="loginbutton" type="submit">Login</button>
            <br>
            <hr class="line">   
            <a href="register.html"><button class="registerbutton" type="button">Create an new account</button></a>
            
        </form>
    </div>

</div>
</body>

</html>
